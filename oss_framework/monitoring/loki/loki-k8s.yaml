# ============================================================================
# Loki Kubernetes Deployment
# ============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: sis-analytics
data:
  loki-config.yml: |
    auth_enabled: false

    ingester:
      max_chunk_age: 1h
      max_chunk_size: 262144
      chunk_idle_period: 3m
      replication_factor: 3

    limits_config:
      enforce_metric_name: false
      reject_old_samples: true
      reject_old_samples_max_age: 168h

    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: s3
          schema: v12
          index:
            prefix: index_
            period: 24h

    server:
      http_listen_port: 3100
      grpc_listen_port: 9096

    storage_config:
      aws:
        region: us-east-1
        bucketnames: sis-analytics-logs
        endpoint: s3.amazonaws.com
      index_cache_validity: 5m

    chunk_store_config:
      max_look_back_period: 0s

    query_range:
      max_cache_freshness_per_query: 10m
      align_queries_with_step: true

    querier:
      engine: prometheus
      max_concurrent: 20

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: sis-analytics
  labels:
    app: loki
spec:
  serviceName: loki-headless
  replicas: 3
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      securityContext:
        fsGroup: 10001
        runAsNonRoot: true
        runAsUser: 10001
      containers:
      - name: loki
        image: grafana/loki:2.9.3
        args:
          - '-config.file=/etc/loki/local-config.yaml'
          - '-config.expand-env=true'
        env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-credentials
              key: secret-access-key
        ports:
        - name: http
          containerPort: 3100
        - name: grpc
          containerPort: 9096
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 45
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 45
          periodSeconds: 10
        volumeMounts:
        - name: loki-config
          mountPath: /etc/loki
        - name: loki-storage
          mountPath: /loki
      volumes:
      - name: loki-config
        configMap:
          name: loki-config
      - name: loki-storage
        emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: sis-analytics
  labels:
    app: loki
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 3100
    targetPort: 3100
  - name: grpc
    port: 9096
    targetPort: 9096
  selector:
    app: loki

---
apiVersion: v1
kind: Service
metadata:
  name: loki-headless
  namespace: sis-analytics
  labels:
    app: loki
spec:
  clusterIP: None
  ports:
  - name: http
    port: 3100
    targetPort: 3100
  - name: grpc
    port: 9096
    targetPort: 9096
  selector:
    app: loki
