apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: sis-analytics
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 50Gi
  storageClassName: fast-ssd

---

apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: sis-analytics
  labels:
    app: postgres
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql
  clusterIP: None
  selector:
    app: postgres

---

apiVersion: v1
kind: Service
metadata:
  name: postgres-lb
  namespace: sis-analytics
  labels:
    app: postgres
spec:
  type: LoadBalancer
  ports:
    - port: 5432
      targetPort: 5432
      name: postgresql
  selector:
    app: postgres

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: sis-analytics
  labels:
    app: postgres
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        runAsUser: 999

      containers:
      - name: postgres
        image: postgres:16-alpine
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 5432
          name: postgresql

        envFrom:
        - configMapRef:
            name: postgres-config
        - secretRef:
            name: postgres-credentials

        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U sis_admin -d sis_analytics
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U sis_admin -d sis_analytics
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 3

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
          subPath: postgres
        - name: init-scripts
          mountPath: /docker-entrypoint-initdb.d

      volumes:
      - name: init-scripts
        configMap:
          name: postgres-init-scripts
          defaultMode: 0555

  volumeClaimTemplates:
  - metadata:
      name: postgres-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: fast-ssd
      resources:
        requests:
          storage: 50Gi

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-scripts
  namespace: sis-analytics
data:
  00-init.sql: |
    CREATE SCHEMA IF NOT EXISTS stage_1;
    CREATE SCHEMA IF NOT EXISTS stage_2a;
    CREATE SCHEMA IF NOT EXISTS stage_2b;
    CREATE SCHEMA IF NOT EXISTS stage_3;
    
    CREATE TABLE IF NOT EXISTS stage_1.students (
      student_id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      district_student_id VARCHAR(50) UNIQUE,
      first_name VARCHAR(100),
      last_name VARCHAR(100),
      date_of_birth DATE,
      created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
      load_date DATE DEFAULT CURRENT_DATE
    );
    
    CREATE INDEX IF NOT EXISTS idx_students_district_id ON stage_1.students(district_student_id);
