apiVersion: v1
kind: Namespace
metadata:
  name: sis-analytics
  labels:
    app.kubernetes.io/name: sis-analytics
    app.kubernetes.io/managed-by: terraform

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: sis-analytics
data:
  POSTGRES_DB: "sis_analytics"
  POSTGRES_USER: "sis_admin"
  POSTGRES_INITDB_ARGS: "-c shared_buffers=1GB -c max_connections=100 -c log_statement=all"
  LOG_STATEMENT: "all"

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: pipeline-config
  namespace: sis-analytics
data:
  LOG_LEVEL: "INFO"
  PYTHONUNBUFFERED: "1"

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: sis-analytics
data:
  GF_USERS_ALLOW_SIGN_UP: "false"
  GF_INSTALL_PLUGINS: "grafana-piechart-panel"

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: metabase-config
  namespace: sis-analytics
data:
  MB_DB_TYPE: "h2"
  JAVA_TIMEZONE: "UTC"

---

apiVersion: v1
kind: ConfigMap
metadata:
  name: superset-config
  namespace: sis-analytics
data:
  FLASK_ENV: "production"
  SUPERSET_LOAD_EXAMPLES: "no"

---

apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: sis-analytics
type: Opaque
stringData:
  POSTGRES_PASSWORD: "change_me_production_password"
  connection-string: "postgresql://sis_admin:change_me_production_password@postgres:5432/sis_analytics"

---

apiVersion: v1
kind: Secret
metadata:
  name: grafana-credentials
  namespace: sis-analytics
type: Opaque
stringData:
  admin-password: "change_me_grafana_password"

---

apiVersion: v1
kind: Secret
metadata:
  name: superset-credentials
  namespace: sis-analytics
type: Opaque
stringData:
  SUPERSET_SECRET_KEY: "change_me_superset_key"

---

apiVersion: v1
kind: Secret
metadata:
  name: pgadmin-credentials
  namespace: sis-analytics
type: Opaque
stringData:
  PGADMIN_DEFAULT_PASSWORD: "change_me_pgadmin_password"
