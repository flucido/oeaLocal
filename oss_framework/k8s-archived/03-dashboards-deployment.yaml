  name: superset
  namespace: sis-analytics
  labels:
    app: superset
spec:
  ports:
    - port: 8088
      targetPort: 8088
      name: superset
  selector:
    app: superset

---

apiVersion: v1
kind: Service
metadata:
  name: superset-lb
  namespace: sis-analytics
  labels:
    app: superset
spec:
  type: LoadBalancer
  ports:
    - port: 8088
      targetPort: 8088
      name: superset
  selector:
    app: superset

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: superset
  namespace: sis-analytics
  labels:
    app: superset
spec:
  replicas: 1
  selector:
    matchLabels:
      app: superset
  template:
    metadata:
      labels:
        app: superset
    spec:
      containers:
      - name: superset
        image: apache/superset:3.0.0
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8088
          name: superset

        env:
        - name: FLASK_ENV
          valueFrom:
            configMapKeyRef:
              name: superset-config
              key: FLASK_ENV
        - name: SUPERSET_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: superset-credentials
              key: SUPERSET_SECRET_KEY
        - name: SUPERSET_LOAD_EXAMPLES
          valueFrom:
            configMapKeyRef:
              name: superset-config
              key: SUPERSET_LOAD_EXAMPLES

        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        volumeMounts:
        - name: superset-storage
          mountPath: /app/superset_home

        livenessProbe:
          httpGet:
            path: /health
            port: 8088
          initialDelaySeconds: 60
          periodSeconds: 15

        readinessProbe:
          httpGet:
            path: /health
            port: 8088
          initialDelaySeconds: 30
          periodSeconds: 10

      volumes:
      - name: superset-storage
        persistentVolumeClaim:
          claimName: superset-pvc
