version: '3.8'

services:
  metabase:
    build:
      context: .
      dockerfile: Dockerfile
    image: metabase-duckdb:latest
    container_name: oss-metabase
    hostname: metabase
    ports:
      - "3000:3000"
    volumes:
      # Persist Metabase application data (H2 database, settings)
      - metabase-data:/metabase-data
      # Mount DuckDB database (needs write access for .wal file)
      - ../../data:/data
      # Optional: DuckDB driver plugin directory
      - ./plugins:/plugins
    user: "0:0"
    environment:
      # Use H2 database for Metabase metadata (simple, single-file)
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
      # Site configuration
      MB_SITE_NAME: "OSS Student Analytics"
      MB_SITE_LOCALE: "en"
      # Java heap size (2GB recommended for analytics workloads)
      JAVA_OPTS: "-Xmx2g -Xms512m"
      # Plugin directory for DuckDB driver
      MB_PLUGINS_DIR: /plugins
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      - metabase-network

volumes:
  metabase-data:
    driver: local
    name: oss-metabase-data

networks:
  metabase-network:
    driver: bridge
    name: oss-metabase-network
